# SPRING BOOT BACKEND

services:
  - type: web
    name: solemate-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: "8080"

      - key: SPRING_BASE_URL
        fromService:
          type: web
          name: solemate-frontend
          property: host

      - key: DATABASE_URL
        value: "jdbc:postgresql://ep-autumn-meadow-a59kt4rh-pooler.us-east-2.aws.neon.tech/neondb?sslmode=require"
      - key: DB_USERNAME
        value: "neondb_owner"
      - key: DB_PASSWORD
        value: "Bz5TYJlKOwj1"

      - key: GEMINI_API_KEY
        value: "AIzaSyAzZcDAPrK_F6hZzpYxkK5ONjpvmeba-nU"

    buildFilters:
      paths:
        - backend/**

  # REACT FRONTEND
  - type: web
    name: solemate-frontend
    runtime: node
    rootDir: frontend
    buildCommand: bun install && bun run build
    startCommand: bun run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BUN_VERSION
        value: "1.1.0"
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: solemate-backend
          property: host
    buildFilters:
      paths:
        - frontend/**