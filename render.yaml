services:
  # SPRING BOOT BACKEND

  - type: web
    name: solemate-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: "8080"

      - key: SPRING_BASE_URL
        fromService:
          type: web
          name: solemate-frontend
          property: host

      - key: DATABASE_URL
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: GEMINI_API_KEY
        sync: false

    buildFilter:
      paths:
        - backend/**

  # REACT FRONTEND

  - type: web
    name: solemate-frontend
    runtime: node
    rootDir: frontend
    buildCommand: bun install && bun run build
    startCommand: bun run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BUN_VERSION
        value: "1.1.0"

      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: solemate-backend
          property: host

    buildFilter:
      paths:
        - frontend/**